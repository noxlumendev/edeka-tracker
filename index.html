<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Edeka Tracker</title>

<!-- PWA / iOS Homescreen -->

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&family=Archivo+Black&display=swap" rel="stylesheet">

<style>
:root {
  --yellow: #FFCC00;
  --yellow-light: #FFF4B8;
  --yellow-soft: #FFE680;
  --blue: #003C82;
  --blue-dark: #002857;
  --blue-light: #1F5BA8;
  --bg: #FFFCF0;
  --card: #FFFFFF;
  --text: #003C82;
  --text-dim: #6B7B95;
  --text-muted: #B8C2D2;
  --border: #F0E6B8;
  --border-strong: #E0D080;
  --warn: #E67E00;
  --danger: #D0021B;
  --heat-0: #FFFFFF;
  --heat-1: #FFF4B8;
  --heat-2: #FFE066;
  --heat-3: #FFCC00;
  --heat-4: #003C82;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Archivo', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.4;
  min-height: 100vh;
  min-height: 100dvh;
  overscroll-behavior-y: none;
  -webkit-font-smoothing: antialiased;
}

body {
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  background-image:
    radial-gradient(circle at 0% 0%, rgba(255,204,0,0.18) 0%, transparent 40%),
    radial-gradient(circle at 100% 0%, rgba(255,204,0,0.10) 0%, transparent 35%);
}

button {
  font-family: inherit;
  background: none;
  border: none;
  color: inherit;
  cursor: pointer;
  font-size: inherit;
}

input {
  font-family: inherit;
  background: var(--bg);
  border: 2px solid var(--border-strong);
  color: var(--text);
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 16px;
  width: 100%;
  font-weight: 600;
}
input:focus { outline: none; border-color: var(--blue); }

.app { max-width: 480px; margin: 0 auto; padding: 16px 14px 40px; }

/* Edeka logo */
.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 8px 0 24px;
}
.brand .logo {
  width: 90px;
  display: block;
  filter: drop-shadow(0 4px 0 var(--blue-dark));
}
.brand .logo img,
.brand .logo svg {
  display: block;
  width: 100%;
  height: auto;
}
.brand .subtitle {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.32em;
  margin-top: 16px;
  font-weight: 700;
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.stat {
  background: var(--card);
  border: 2px solid var(--blue);
  border-radius: 12px;
  padding: 14px 6px;
  text-align: center;
  box-shadow: 0 3px 0 var(--blue);
  position: relative;
}
.stat .val {
  font-family: 'Archivo Black', sans-serif;
  font-size: 22px;
  font-weight: 900;
  color: var(--blue);
  line-height: 1;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}
.stat .lbl {
  font-size: 9px;
  color: var(--blue);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 800;
}
.stat.warn { border-color: var(--warn); box-shadow: 0 3px 0 var(--warn); }
.stat.warn .val, .stat.warn .lbl { color: var(--warn); }
.stat.danger { border-color: var(--danger); box-shadow: 0 3px 0 var(--danger); background: #FFF0F0; }
.stat.danger .val, .stat.danger .lbl { color: var(--danger); }

/* Calendar Card */
.cal-card {
  background: var(--card);
  border: 2px solid var(--blue);
  border-radius: 16px;
  padding: 16px 12px;
  margin-top: 4px;
  box-shadow: 0 3px 0 var(--blue);
}

.cal-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 4px 10px;
}
.cal-nav button {
  width: 38px;
  height: 38px;
  background: var(--yellow);
  border: 2px solid var(--blue);
  border-radius: 10px;
  color: var(--blue);
  font-size: 22px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
  box-shadow: 0 2px 0 var(--blue);
  font-family: 'Archivo Black', sans-serif;
  line-height: 1;
}
.cal-nav button:active { transform: translateY(2px); box-shadow: 0 0 0 var(--blue); }
.cal-nav .month-name {
  font-family: 'Archivo Black', sans-serif;
  font-size: 19px;
  font-weight: 900;
  color: var(--blue);
  letter-spacing: -0.01em;
}

.cal-progress {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  padding: 4px 0 14px;
  font-weight: 700;
}
.cal-progress .bar {
  width: 100%;
  height: 8px;
  background: var(--yellow-light);
  border: 1.5px solid var(--blue);
  border-radius: 4px;
  margin-top: 8px;
  overflow: hidden;
}
.cal-progress .bar-fill {
  height: 100%;
  background: var(--yellow);
  transition: width 0.4s cubic-bezier(.5,1.4,.5,1);
}

.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  padding: 8px 0;
}
.weekdays div {
  text-align: center;
  font-size: 10px;
  color: var(--blue);
  letter-spacing: 0.18em;
  font-weight: 800;
}

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}
.day {
  aspect-ratio: 1;
  border: 2px solid var(--border);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-dim);
  transition: transform 0.1s, box-shadow 0.1s;
  background: var(--heat-0);
  font-weight: 700;
}
.day.empty { border-color: transparent; background: transparent; }
.day.in-month { color: var(--blue); }
.day.today {
  border-color: var(--blue);
  box-shadow: 0 0 0 1px var(--blue), 0 2px 0 var(--blue);
}
.day:not(.empty):active { transform: translateY(1px); }

.day .h {
  font-size: 8px;
  color: var(--text-muted);
  margin-top: 2px;
  letter-spacing: 0.05em;
  font-weight: 700;
}

.day.worked {
  background: var(--yellow);
  border-color: var(--blue);
  color: var(--blue);
  font-weight: 900;
  box-shadow: 0 2px 0 var(--blue);
}
.day.worked .h { color: var(--blue); opacity: 0.85; font-weight: 800; }
.day.today.worked { box-shadow: 0 0 0 2px var(--blue-dark), 0 2px 0 var(--blue); }

.hint {
  text-align: center;
  font-size: 10px;
  color: var(--blue);
  letter-spacing: 0.2em;
  padding: 18px 0 8px;
  font-weight: 700;
  opacity: 0.6;
}

.footer-actions {
  display: flex;
  justify-content: center;
  gap: 14px;
  padding: 12px 0;
  font-size: 10px;
  letter-spacing: 0.15em;
  flex-wrap: wrap;
}
.footer-actions button {
  background: var(--card);
  color: var(--blue);
  padding: 10px 14px;
  border: 2px solid var(--blue);
  border-radius: 8px;
  font-weight: 800;
  letter-spacing: 0.1em;
  box-shadow: 0 2px 0 var(--blue);
  transition: all 0.12s;
}
.footer-actions button:active { transform: translateY(2px); box-shadow: 0 0 0 var(--blue); }

/* Modal */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0, 60, 130, 0.4);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  padding: env(safe-area-inset-top) 0 0;
}
.modal-bg.open { display: flex; animation: fadein 0.18s; }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal {
  background: var(--card);
  border: 3px solid var(--blue);
  border-bottom: none;
  border-radius: 22px 22px 0 0;
  padding: 22px 20px calc(28px + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 480px;
  animation: slideup 0.25s cubic-bezier(.2,1,.4,1);
}

.modal h2 {
  font-family: 'Archivo Black', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: var(--blue);
  letter-spacing: 0.05em;
  margin-bottom: 4px;
  text-align: center;
}
.modal .modal-date {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  margin-bottom: 22px;
  font-weight: 700;
}

.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 10px;
  color: var(--blue);
  letter-spacing: 0.18em;
  margin-bottom: 6px;
  text-transform: uppercase;
  font-weight: 800;
}

.row { display: flex; gap: 10px; }
.row .field { flex: 1; }

.calc-box {
  background: var(--yellow);
  border: 2px solid var(--blue);
  border-radius: 12px;
  padding: 14px;
  margin: 18px 0 22px;
  display: flex;
  justify-content: space-around;
  text-align: center;
  box-shadow: 0 3px 0 var(--blue);
}
.calc-box .item .v {
  font-family: 'Archivo Black', sans-serif;
  font-size: 22px;
  color: var(--blue);
  font-weight: 900;
  letter-spacing: -0.02em;
}
.calc-box .item .l {
  font-size: 9px;
  color: var(--blue);
  letter-spacing: 0.2em;
  margin-top: 4px;
  font-weight: 800;
}

.btn-row { display: flex; gap: 8px; margin-top: 8px; }
.btn {
  flex: 1;
  padding: 14px 8px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 0.12em;
  border: 2px solid var(--blue);
  text-transform: uppercase;
  font-family: 'Archivo Black', sans-serif;
  transition: all 0.12s;
  box-shadow: 0 3px 0 var(--blue);
}
.btn:active { transform: translateY(3px); box-shadow: 0 0 0 var(--blue); }
.btn-primary { background: var(--yellow); color: var(--blue); }
.btn-secondary { background: var(--card); color: var(--blue); }
.btn-danger { color: var(--danger); border-color: var(--danger); background: var(--card); box-shadow: 0 3px 0 var(--danger); }
.btn-danger:active { box-shadow: 0 0 0 var(--danger); }

.settings-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 22px; }

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: var(--blue);
  color: var(--yellow);
  padding: 12px 22px;
  border-radius: 10px;
  font-size: 11px;
  letter-spacing: 0.2em;
  font-weight: 900;
  z-index: 200;
  transition: transform 0.3s cubic-bezier(.2,1.5,.4,1);
  box-shadow: 0 4px 0 var(--blue-dark);
  font-family: 'Archivo Black', sans-serif;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>

<script>
const KEY = 'edeka_tracker_v1';
const DEFAULTS = { settings: { rate: 14.3571, limit: 603 }, shifts: {} };

function loadState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return structuredClone(DEFAULTS);
    return { ...DEFAULTS, ...JSON.parse(raw) };
  } catch { return structuredClone(DEFAULTS); }
}
function saveState() { localStorage.setItem(KEY, JSON.stringify(state)); }

let state = loadState();
let viewYear, viewMonth;
let activeDate = null;

const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const pad = n => String(n).padStart(2, '0');
const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

const fmtEuro = n => new Intl.NumberFormat('de-DE', { style:'currency', currency:'EUR', minimumFractionDigits: 2 }).format(n);
const fmtHours = h => h.toFixed(2).replace('.', ',');

function shiftHours(s) {
  if (!s || !s.start || !s.end) return 0;
  const [sh, sm] = s.start.split(':').map(Number);
  const [eh, em] = s.end.split(':').map(Number);
  let mins = (eh*60+em) - (sh*60+sm);
  if (mins < 0) mins += 24*60;
  mins -= (s.break || 0);
  return Math.max(0, mins / 60);
}

function monthTotals(year, month) {
  let h = 0, w = 0;
  for (const k in state.shifts) {
    const [y, m] = k.split('-').map(Number);
    if (y === year && m === month + 1) {
      const sh = shiftHours(state.shifts[k]);
      h += sh;
      w += sh * state.settings.rate;
    }
  }
  return { hours: h, wage: w };
}

function render() {
  document.getElementById('month-name').textContent = `${MONTHS[viewMonth]} ${viewYear}`;

  const t = monthTotals(viewYear, viewMonth);
  const limit = state.settings.limit;
  const rest = limit - t.wage;
  const pct = Math.min(100, Math.round((t.wage / limit) * 100));

  document.getElementById('stat-hours-val').textContent = fmtHours(t.hours);
  document.getElementById('stat-wage-val').textContent = fmtEuro(t.wage);
  document.getElementById('stat-rest-val').textContent = fmtEuro(rest);

  const restEl = document.getElementById('stat-rest');
  restEl.classList.remove('warn', 'danger');
  if (rest < 0) restEl.classList.add('danger');
  else if (rest < limit * 0.05) restEl.classList.add('warn');

  document.getElementById('progress-text').textContent = `${fmtHours(t.wage)} / ${fmtHours(limit)} € · ${pct}%`;
  document.getElementById('progress-bar').style.width = pct + '%';

  const grid = document.getElementById('days');
  grid.innerHTML = '';
  const first = new Date(viewYear, viewMonth, 1);
  const last = new Date(viewYear, viewMonth + 1, 0);
  let startDow = first.getDay() - 1; if (startDow < 0) startDow = 6;
  const today = new Date();
  const todayKey = dateKey(today);

  for (let i = 0; i < startDow; i++) {
    const d = document.createElement('div');
    d.className = 'day empty';
    grid.appendChild(d);
  }
  for (let day = 1; day <= last.getDate(); day++) {
    const d = new Date(viewYear, viewMonth, day);
    const k = dateKey(d);
    const shift = state.shifts[k];
    const hrs = shift ? shiftHours(shift) : 0;
    const worked = hrs > 0;

    const el = document.createElement('div');
    el.className = `day in-month${worked ? ' worked' : ''}${k === todayKey ? ' today' : ''}`;
    el.innerHTML = `<div>${day}</div>${worked ? `<div class="h">${fmtHours(hrs)}h</div>` : '<div class="h">·</div>'}`;
    el.addEventListener('click', () => openDayModal(k));
    grid.appendChild(el);
  }
}

function openDayModal(key) {
  activeDate = key;
  const [y, m, d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const wd = ['SO','MO','DI','MI','DO','FR','SA'][dt.getDay()];
  document.getElementById('modal-date').textContent = `${wd} · ${pad(d)}.${pad(m)}.${y}`;

  const s = state.shifts[key] || { start:'', end:'', break:0 };
  document.getElementById('inp-start').value = s.start || '';
  document.getElementById('inp-end').value = s.end || '';
  document.getElementById('inp-break').value = s.break || 0;

  document.getElementById('day-delete').style.display = state.shifts[key] ? '' : 'none';

  updateCalcBox();
  document.getElementById('day-modal').classList.add('open');
}

function updateCalcBox() {
  const s = {
    start: document.getElementById('inp-start').value,
    end: document.getElementById('inp-end').value,
    break: Number(document.getElementById('inp-break').value) || 0
  };
  const h = shiftHours(s);
  document.getElementById('calc-hours').textContent = fmtHours(h);
  document.getElementById('calc-wage').textContent = fmtEuro(h * state.settings.rate);
}

function closeDayModal() { document.getElementById('day-modal').classList.remove('open'); }

function saveDay() {
  const start = document.getElementById('inp-start').value;
  const end = document.getElementById('inp-end').value;
  const br = Number(document.getElementById('inp-break').value) || 0;
  if (!start || !end) { closeDayModal(); return; }
  state.shifts[activeDate] = { start, end, break: br };
  saveState();
  toast('GESPEICHERT');
  closeDayModal();
  render();
}

function deleteDay() {
  delete state.shifts[activeDate];
  saveState();
  toast('GELÖSCHT');
  closeDayModal();
  render();
}

function openSettings() {
  document.getElementById('set-rate').value = state.settings.rate;
  document.getElementById('set-limit').value = state.settings.limit;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
function saveSettings() {
  state.settings.rate = Number(document.getElementById('set-rate').value) || 14.3571;
  state.settings.limit = Number(document.getElementById('set-limit').value) || 603;
  saveState();
  toast('AKTUALISIERT');
  closeSettings();
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `edeka-tracker-backup-${dateKey(new Date())}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('EXPORTIERT');
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.shifts && data.settings) {
        if (confirm('Aktuelle Daten überschreiben mit Backup?')) {
          state = data;
          saveState();
          render();
          toast('IMPORTIERT');
        }
      } else { alert('Ungültiges Backup-Format'); }
    } catch { alert('Datei konnte nicht gelesen werden'); }
  };
  reader.readAsText(file);
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function init() {
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();

  document.getElementById('prev-month').onclick = () => {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    render();
  };
  document.getElementById('next-month').onclick = () => {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    render();
  };

  document.getElementById('day-save').onclick = saveDay;
  document.getElementById('day-cancel').onclick = closeDayModal;
  document.getElementById('day-delete').onclick = () => {
    if (confirm('Diese Schicht wirklich löschen?')) deleteDay();
  };
  document.getElementById('inp-start').oninput = updateCalcBox;
  document.getElementById('inp-end').oninput = updateCalcBox;
  document.getElementById('inp-break').oninput = updateCalcBox;

  document.getElementById('btn-settings').onclick = openSettings;
  document.getElementById('settings-save').onclick = saveSettings;
  document.getElementById('settings-cancel').onclick = closeSettings;

  document.getElementById('btn-export').onclick = exportData;
  document.getElementById('btn-import').onclick = () => document.getElementById('file-input').click();
  document.getElementById('file-input').onchange = e => {
    if (e.target.files[0]) importData(e.target.files[0]);
    e.target.value = '';
  };

  document.querySelectorAll('.modal-bg').forEach(bg => {
    bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('open'); });
  });

  render();
}

init();
</script>

</body>
</html>
